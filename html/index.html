<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página principal de multicines</title>
    <link href="../public/website_icon3.png" rel="website icon" type="png">
    <!-- Enlace a Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="../estilos/estilosIndex.css" rel="stylesheet">
</head>

<body>
    <header class="header bg-dark text-white p-3">
        <div class="d-flex justify-content-between align-items-center container">
            <div class="header-logo_cine">
                <a href="index.html" class="text-white text-decoration-none fs-4">🎬 Taquilla.com</a>
            </div>
            <form class="d-flex" id="buscador_form_cine"
                action="http://localhost/Proyecto%20Multicines/index.html/search/entities/">
                <input class="form-control me-2" type="text" id="buscador_field_cine" name="t10q" autocomplete="off"
                    placeholder="Película / Cine">
                <button class="btn btn-outline-light" type="submit">Buscar</button>
            </form>
            <!-- Botón de Cerrar Sesión -->
            <a href="#" id="cerrarSesion" class="btn btn-outline-light ms-3">Cerrar sesión</a>
        </div>
    </header>

    <!-- Loader -->
    <div id="loader" class="loader-container">
        <div class="spinner-border text-light" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
    </div>

    <main class="container mt-4">
        <h2 class="mb-4 text-center">🎥 Cartelera de Hoy</h2>
        <div class="row row-cols-1 row-cols-md-3 g-4" id="cartelera">
            <!-- Aquí se insertarán las películas dinámicamente -->
        </div>
    </main>

    <footer class="bg-dark text-white text-center p-3 mt-4">
        &copy; 2025 Taquilla.com - Todos los derechos reservados.
    </footer>
    <script src="../js/cartelera.js"></script>
</body>

</html>
