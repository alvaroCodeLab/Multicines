<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visualizar Pases de Película</title>
    <link href="../public/website_icon.png" rel="website icon" type="png">
    <!-- Enlace a Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="../estilos/estilosVisualizarPase.css" rel="stylesheet" />
</head>

<body>
    <div class="container mt-5">
        <header class="text-center mb-4">
            <h2 class="display-4 text-success">Visualizar Pases de una Película</h2>
        </header>

        <div class="form-group mb-4">
            <label for="peliculaSelect" class="form-label">Selecciona una Película:</label>
            <select id="peliculaSelect" class="form-select">
                <option value="">-- Selecciona una película --</option>
            </select>
        </div>

        <!-- Mensaje de carga -->
        <div id="cargando" class="cargando" style="display:none;">
            <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
            <p>Cargando los pases...</p>
        </div>

        <!-- Resultado de los pases -->
        <div id="resultado" class="row">
            <!-- Los pases se mostrarán aquí -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/visualizarPase.js"></script>
</body>

</html>
