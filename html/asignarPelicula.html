<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Asignar Película a Sala</title>
    <link href="../public/website_icon.png" rel="website icon" type="png">
    <!-- Enlace a Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="../estilos/estilosAsignarPelicula.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-primary">Asignar Película a Sala</h2>

        <!-- Spinner de carga -->
        <div id="loadingSpinner" class="d-none text-center mb-4">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
        </div>

        <form id="formAsignar" class="card p-4 shadow">
            <div class="mb-3">
                <label for="cine" class="form-label">Selecciona el Cine</label>
                <select id="cine" class="form-select" required></select>
            </div>

            <div class="mb-3">
                <label for="sala" class="form-label">Selecciona la Sala</label>
                <select id="sala" class="form-select" required></select>
            </div>

            <div class="mb-3">
                <label for="pelicula" class="form-label">Selecciona la Película</label>
                <select id="pelicula" class="form-select" required></select>
            </div>

            <button type="submit" class="btn btn-success w-100">
                <i class="fas fa-check-circle"></i> Asignar Película
            </button>
        </form>

        <div id="mensaje" class="mt-4"></div>
    </div>

    <script src="../js/asignarPelicula.js"></script>
</body>

</html>
