<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles de Película</title>
    <link href="../public/website_icon3.png" rel="website icon" type="png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link href="../estilos/estilosPelicula.css" rel="stylesheet">

    <!-- Iconos -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
</head>

<body>

    <!-- HEADER NUEVO -->
    <header class="header bg-dark text-white">
        <nav class="navbar container d-flex justify-content-between align-items-center">
    
            <!-- IZQUIERDA: Logo -->
            <a class="navbar-brand fw-bold text-white m-0" href="GUI.html">
                🎬 Taquilla.com
            </a>
    
            <!-- DERECHA: Botón volver -->
            <a href="GUI.html" class="btn btn-outline-light d-flex align-items-center gap-2">
                <i class="fas fa-arrow-left"></i>
                <span class="d-none d-md-inline">Volver</span>
            </a>
    
        </nav>
    </header>

    <!-- CONTENIDO -->
    <main class="container mt-5 mb-5" id="detallePelicula">

        <div id="spinner" class="d-flex justify-content-center align-items-center" style="height: 300px;">
            <div class="spinner-border text-info" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
        </div>

    </main>

    <!-- MODAL -->
    <div class="modal fade" id="modalCompra" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Confirmar Compra</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <p><strong>¿Cuántas entradas deseas comprar?</strong></p>
                    <input type="number" id="numEntradas" class="form-control" min="1" required>

                    <div id="errorCompra" class="alert alert-danger mt-2" style="display: none;">
                        Número de entradas inválido o insuficientes.
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cerrar
                    </button>
                    <button type="button" class="btn btn-primary" id="confirmarCompraBtn" disabled>
                        Confirmar Compra
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center p-3 mt-5">
        &copy; 2025 Taquilla.com - Todos los derechos reservados.
    </footer>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/pelicula.js"></script>

</body>
</html>
