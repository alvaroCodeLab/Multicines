<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Multicines</title>

    <link href="../public/website_icon3.png" rel="icon" type="image/png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link href="../estilos/estilosLoginyRegistro.css" rel="stylesheet">
</head>

<body>

<div class="main-container">

    <div class="side-panel">
        <h1>🍿 Únete</h1>
        <p>Crea tu cuenta y disfruta del cine</p>
    </div>

    <div class="form-panel">

        <div class="registro-container">
            <h2>Crear cuenta</h2>

            <form id="registerForm">

                <div class="grid">

                    <div class="input-group-custom">
                        <input type="text" id="dni" required>
                        <label>DNI</label>
                    </div>

                    <div class="input-group-custom">
                        <input type="text" id="nombre" required>
                        <label>Nombre</label>
                    </div>

                    <div class="input-group-custom">
                        <input type="email" id="email" required>
                        <label>Email</label>
                    </div>

                    <div class="input-group-custom">
                        <input type="tel" id="telefono" required>
                        <label>Teléfono</label>
                    </div>

                    <div class="input-group-custom">
                        <input type="password" id="password" required>
                        <label>Contraseña</label>
                    </div>

                    <div class="input-group-custom">
                        <input type="password" id="confirm_password" required>
                        <label>Confirmar</label>
                    </div>

                </div>

                <button type="submit" class="btn btn-primary">Registrarse</button>

                <a href="login.html" class="link">¿Ya tienes cuenta? Inicia sesión</a>

            </form>

            <div id="errorMessage"></div>

        </div>

    </div>

</div>

<script src="../js/registro.js"></script>
</body>
</html>
