<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de usuarios en Multicines.</title>
    <link href="../public/website_icon3.png" rel="website icon" type="png">
    <!-- Enlace a Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../estilos/estilosLoginyRegistro.css" rel="stylesheet">
</head>

<body>
    <div class="login-container">
        <h2>Registro de usuarios</h2>
        <form id="registerForm">
            <div class="mb-3">
                <label for="dni" class="form-label">DNI:</label>
                <input type="text" id="dni" name="dni" class="form-control" placeholder="Introduce tu DNI" required>
            </div>
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre:</label>
                <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Introduce tu nombre"
                    required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Correo Electrónico:</label>
                <input type="email" id="email" name="email" class="form-control"
                    placeholder="Introduce tu correo electrónico" required>
            </div>
            <div class="mb-3">
                <label for="telefono" class="form-label">Teléfono:</label>
                <input type="tel" id="telefono" name="telefono" class="form-control" placeholder="Introduce tu teléfono"
                    required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña:</label>
                <input type="password" id="password" name="password" class="form-control"
                    placeholder="Introduce tu contraseña" required>
                <div id="passwordHelp" class="form-text">La contraseña debe tener al menos 8 caracteres.</div>
            </div>
            <div class="mb-3">
                <label for="confirm_password">Confirmar contraseña:</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                    placeholder="Repite la contraseña" required>
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-primary">Registrarse</button>
                <br>
                <a href="login.html">¿Ya tienes una cuenta? Inicia Sesión.</a>
            </div>
        </form>

        <div id="errorMessage" style="color: red; display: none;">
            <p class="parrafoError">Aquí se muestra el mensaje de error.</p>
        </div>

    </div>
    <script src="../js/registro.js"></script>
</body>

</html>
