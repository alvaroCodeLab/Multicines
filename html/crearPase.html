<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Pase</title>
    <link href="../public/website_icon.png" rel="website icon" type="png">
    <!-- Enlace a Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../estilos/estilosCrearPase.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <h2>Crear Pase para una Película</h2>

        <!-- Spinner de carga -->
        <div id="loadingSpinner" class="d-none text-center mb-4">
            <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
        </div>

        <form id="formCrearPase">
            <div class="mb-3">
                <label for="pelicula" class="form-label">Película</label>
                <select id="pelicula" name="pelicula" class="form-control" required>
                    <!-- Aquí se cargarán las películas -->
                </select>
            </div>

            <div class="mb-3">
                <label for="sala" class="form-label">Sala</label>
                <select id="sala" name="sala" class="form-control" required>
                    <!-- Aquí se cargarán las salas disponibles -->
                </select>
            </div>

            <div class="mb-3">
                <label for="horaInicio" class="form-label">Hora de Inicio</label>
                <input type="time" id="horaInicio" name="horaInicio" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="horaFin" class="form-label">Hora de Fin</label>
                <input type="time" id="horaFin" name="horaFin" class="form-control" required max="23:45">
            </div>


            <button type="submit" class="btn btn-success">
                <i class="bi bi-plus-circle"></i> Crear Pase
            </button>
        </form>
    </div>

    <script src="../js/crearPase.js"></script>
</body>

</html>
