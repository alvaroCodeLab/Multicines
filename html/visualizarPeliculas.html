<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visualizar Películas</title>
  <link href="../public/website_icon.png" rel="website icon" type="png">
  <!-- Enlace a Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../estilos/estilosVisualizarPeliculas.css">
</head>

<body class="bg-light">
  <div class="container py-5">
    <h1 class="text-center mb-4 text-primary">Películas Disponibles</h1>

    <div class="mb-4">
      <select id="peliculasList" class="form-select">
        <option value="">Selecciona una película</option>
      </select>
    </div>

    <div id="detallePelicula" class="card shadow detallePelicula" style="display: none;">
      <div class="card-body row">
        <div class="col-md-8">
          <h2 id="titulo" class="card-title text-danger"></h2>
          <p><strong>Género:</strong> <span id="genero"></span></p>
          <p><strong>Director:</strong> <span id="director"></span></p>
          <p><strong>Actores:</strong> <span id="actores"></span></p>
          <p><strong>Fecha de Estreno:</strong> <span id="fechaEstreno"></span></p>
          <p><strong>Duración:</strong> <span id="duracion"></span> minutos</p>
        </div>
        <div class="col-md-4 text-center">
          <img id="imagen" class="img-fluid rounded" alt="Imagen de la película" />
        </div>
      </div>
    </div>
  </div>

  <script src="../js/visualizarPeliculas.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
