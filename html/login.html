<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Multicines</title>

    <link href="../public/website_icon3.png" rel="icon" type="image/png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuente moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Estilos -->
    <link href="../estilos/estilosLoginyRegistro.css" rel="stylesheet">
</head>

<body>

<div class="main-container">

    <!-- Panel izquierdo decorativo -->
    <div class="side-panel">
        <h1>🎬 Multicines</h1>
        <p>Vive la mejor experiencia cinematográfica</p>
    </div>

    <!-- Login -->
    <div class="form-panel">
        <div class="login-container">

            <h2>Bienvenido</h2>
            <p class="subtitle">Inicia sesión para continuar</p>

            <form id="loginForm">

                <div class="input-group-custom">
                    <input type="text" id="dni" name="dni" required>
                    <label>DNI</label>
                </div>

                <div class="input-group-custom">
                    <input type="password" id="password" name="password" required>
                    <label>Contraseña</label>
                </div>

                <button type="submit" class="btn btn-primary">Entrar</button>

                <a href="registro.html" class="link">¿No tienes cuenta? Regístrate</a>

            </form>

            <div id="errorMessage"></div>

        </div>
    </div>

</div>

<script src="../js/login.js"></script>
</body>
</html>
