<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login de usuarios en Multicines</title>
    <link href="../public/website_icon3.png" rel="website icon" type="png">
    <!-- Enlace a Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../estilos/estilosLoginyRegistro.css" rel="stylesheet">
</head>

<body>
    <div class="login-container">
        <h2>Acceso al sistema</h2>
        <form id="loginForm">
            <div class="mb-3">
                <label for="dni" class="form-label">DNI:</label>
                <input type="text" id="dni" name="dni" class="form-control" placeholder="Introduce tu DNI" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña:</label>
                <input type="password" id="password" name="password" class="form-control"
                    placeholder="Introduce tu contraseña" required>
                <div id="passwordHelp" class="form-text">La contraseña debe tener al menos 8 caracteres.</div>
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-primary">Iniciar sesión</button>
                <a href="registro.html">¿Todavía no tienes cuenta? Regístrate.</a>
            </div>
        </form>

        <div id="errorMessage" style="color: red; display: none;"></div>

    </div>
    <script src="../js/login.js"></script>
</body>

</html>
