<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Película</title>
    <link href="../public/website_icon.png" rel="website icon" type="png">
    <!-- Enlace a Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../estilos/estilosRegistrarPelicula.css">
</head>

<body>
    <div class="header">
        <h1>Gestión de Películas</h1>
        <p>Creación de nuevas películas en el sistema</p>
    </div>

    <div class="container mt-5">
        <h2 class="text-center mb-4">Registrar Nueva Película</h2>

        <form id="peliculaForm">
            <div class="mb-3">
                <label for="titulo" class="form-label">Título</label>
                <input id="titulo" type="text" name="titulo" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="genero" class="form-label">Género</label>
                <input id="genero" type="text" name="genero" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="director" class="form-label">Director</label>
                <input id="director" type="text" name="director" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="actores" class="form-label">Actores</label>
                <textarea id="actores" name="actores" class="form-control" required></textarea>
            </div>

            <div class="mb-3">
                <label for="fechaEstreno" class="form-label">Fecha de Estreno</label>
                <input id="fechaEstreno" type="date" name="fechaEstreno" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="duracion" class="form-label">Duración (minutos)</label>
                <input id="duracion" type="number" name="duracion" class="form-control" required min="1">
            </div>

            <div class="mb-3">
                <label for="imagen" class="form-label">Imagen de la película</label>
                <input id="imagen" type="file" name="imagen" class="form-control" accept="image/*" required>
            </div>

            <!-- Vista previa de la imagen seleccionada -->
            <div id="imagePreviewContainer" style="display:none;">
                <img id="imagePreview" src="" alt="Vista previa de la imagen"
                    style="max-width: 200px; margin-top: 10px;">
            </div>

            <div class="text-center">
                <button id="btnRegistrarPelicula" type="submit" class="btn btn-primary">Registrar Película</button>
            </div>
        </form>
        <br>
        <!-- Mensaje de éxito o error -->
        <div id="mensaje" class="alert" role="alert"
            style="display:none; opacity: 0; transition: opacity 1s ease-in-out;"></div>
    </div>
    <br>

    <script src="../js/registrarPelicula.js"></script>
</body>

</html>
